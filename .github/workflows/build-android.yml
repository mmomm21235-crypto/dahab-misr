name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create static output directory
        run: mkdir -p out

      - name: Create index.html redirect
        run: |
          cat > out/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
            <meta name="theme-color" content="#1a1a1a">
            <title>ุทยฐุธโกุทยจ ุธโฆุทยตุทยฑ</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: #1a1a1a; color: white;
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                min-height: 100vh; text-align: center; padding: 20px;
              }
              .logo {
                width: 80px; height: 80px; border-radius: 20px;
                background: linear-gradient(135deg, #f59e0b, #d97706);
                display: flex; align-items: center; justify-content: center;
                font-size: 36px; font-weight: bold; color: white; margin-bottom: 24px;
                box-shadow: 0 10px 30px rgba(245,158,11,0.3);
              }
              h1 { font-size: 24px; margin-bottom: 8px; }
              p { color: #a3a3a3; margin-bottom: 32px; }
              .spinner {
                width: 32px; height: 32px; border: 3px solid #333;
                border-top-color: #f59e0b; border-radius: 50%;
                animation: spin 0.8s linear infinite;
              }
              @keyframes spin { to { transform: rotate(360deg); } }
            </style>
          </head>
          <body>
            <div class="logo">ุทยฐ</div>
            <h1>ุทยฐุธโกุทยจ ุธโฆุทยตุทยฑ</h1>
            <p>ุทยฌุทยงุทยฑุธูน ุทยงุธโุทฺพุทยญุธโฆุธูนุธโ...</p>
            <div class="spinner"></div>
            <script>
              setTimeout(function() { window.location.replace('https://dahab-misr.vercel.app'); }, 500);
            </script>
          </body>
          </html>
          EOF

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Debug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Build APK (Release)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dahab-misr-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: dahab-misr-release.apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
