name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Create static output
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>dahab-misr</title></head><body><script>window.location="https://dahab-misr.vercel.app"</script></body></html>' > out/index.html
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Sync Capacitor
        run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dahab-misr.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v$VERSION" android/app/build/outputs/apk/debug/app-debug.apk \
            --repo "${{ github.repository }}" \
            --title "ط°ظ‡ط¨ ظ…طµط± v$VERSION" \
            --notes "## ط°ظ‡ط¨ ظ…طµط± - طھط·ط¨ظٹظ‚ ط£ط³ط¹ط§ط± ط§ظ„ط°ظ‡ط¨ ظپظٹ ظ…طµط±

          ### ط§ظ„طھط­ظ…ظٹظ„
          ط­ظ…ظ‘ظ„ ظ…ظ„ظپ APK ظˆط«ط¨ظ‘طھظ‡ ط¹ظ„ظ‰ ط¬ظ‡ط§ط² Android." \
            --generate-notes
