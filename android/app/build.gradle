apply plugin: 'com.android.application'

// ============================================================================
// Load keystore configuration (if exists)
// ============================================================================
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.dahabmisr.app"
    compileSdk = rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.dahabmisr.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }

        // ProGuard / R8 consumer rules are automatically applied
    }

    // ============================================================================
    // Signing Configurations
    // ============================================================================
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile keystoreProperties['storeFile'] ? rootProject.file(keystoreProperties['storeFile']) : null
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    // ============================================================================
    // Build Types - Security Hardened
    // ============================================================================
    buildTypes {
        debug {
            // Debug builds: keep debugging features, no obfuscation
            minifyEnabled false
            shrinkResources false
            debuggable true
            jniDebuggable true
        }

        release {
            // Release builds: full security hardening
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // Apply signing config if keystore exists
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }

            debuggable false
            jniDebuggable false
        }
    }

    // ============================================================================
    // R8 Full Mode (aggressive optimization)
    // Uncomment below to enable R8 full mode for maximum obfuscation
    // WARNING: Test thoroughly before enabling in production
    // ============================================================================
    // android.fullR8 = true

    // ============================================================================
    // Compile Options
    // ============================================================================
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // ============================================================================
    // Build Features
    // ============================================================================
    buildFeatures {
        buildConfig true
    }

    // ============================================================================
    // Packaging Options
    // ============================================================================
    packagingOptions {
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/DEPENDENCIES'
    }

    // ============================================================================
    // Lint Options - Treat as errors in release
    // ============================================================================
    lint {
        abortOnError true
        warningsAsErrors false
        checkReleaseBuilds true
    }
}

// ============================================================================
// Repositories
// ============================================================================
repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

// ============================================================================
// Dependencies
// ============================================================================
dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')

    // Security: Add network security library
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
